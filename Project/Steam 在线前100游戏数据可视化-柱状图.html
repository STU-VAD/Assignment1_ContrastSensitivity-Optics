        :root {
            --bg: #08111f;
            --panel: rgba(10, 18, 32, 0.94);
            --panel-border: rgba(148, 163, 184, 0.25);
            --text-main: #e5eef9;
            --text-sec: #94a3b8;
            --accent: #7dd3fc;
            --grid: rgba(148, 163, 184, 0.16);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(125, 211, 252, 0.14), transparent 34%),
                radial-gradient(circle at 85% 15%, rgba(248, 113, 113, 0.12), transparent 28%),
                linear-gradient(180deg, #020817 0%, #08111f 55%, #030712 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 24px 40px;
        }

        .header {
            width: min(1680px, 100%);
            padding: 32px 0 20px;
        }

        .header h1 {
            margin: 0;
            font-size: clamp(2rem, 2.4vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--accent);
        }

        .header p {
            margin: 12px 0 0;
            color: var(--text-sec);
            font-size: 15px;
            line-height: 1.6;
        }

        .dashboard {
            width: min(1680px, 100%);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 280px;
            gap: 20px;
            align-items: start;
        }

        #chart-wrap {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 32px 80px rgba(2, 8, 23, 0.48);
            overflow: hidden;
        }

        #chart-scroll {
            height: 82vh;
            min-height: 900px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: sticky;
            top: 24px;
        }

        .panel-card {
            background: rgba(10, 18, 32, 0.9);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 22px 50px rgba(2, 8, 23, 0.3);
        }

        .panel-card h2 {
            margin: 0 0 14px;
            font-size: 15px;
            color: var(--accent);
            letter-spacing: 0.04em;
        }

        .stats-grid { display: grid; gap: 12px; }

        .stat-item {
            padding: 12px 14px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 14px;
        }

        .stat-label {
            display: block;
            color: var(--text-sec);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .legend-item:last-child { margin-bottom: 0; }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            flex: 0 0 auto;
        }

        .bar { transition: opacity 0.2s ease; }
        .bar:hover { opacity: 0.88; }

        .axis text { fill: var(--text-sec); font-size: 11px; }
        .axis line, .axis path { stroke: rgba(148, 163, 184, 0.32); }
        .grid line { stroke: var(--grid); stroke-dasharray: 4 6; }
        .grid path { stroke: none; }

        .chart-title { fill: var(--text-main); font-size: 22px; font-weight: 700; }
        .chart-subtitle { fill: var(--text-sec); font-size: 13px; }
        .axis-label { fill: var(--text-sec); font-size: 12px; font-weight: 600; letter-spacing: 0.04em; }

        .tooltip {
            position: fixed;
            max-width: 260px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(125, 211, 252, 0.5);
            border-radius: 12px;
            padding: 12px 14px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.15s ease, transform 0.15s ease;
            color: var(--text-main);
            box-shadow: 0 14px 36px rgba(2, 8, 23, 0.45);
            z-index: 20;
        }

        .tooltip strong {
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
            line-height: 1.4;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 12px;
            margin-top: 4px;
        }

        .tooltip-row span:first-child { color: var(--text-sec); }

        @media (max-width: 1200px) {
            .dashboard { grid-template-columns: 1fr; }
            .side-panel { position: static; order: -1; }
            #chart-scroll { height: 75vh; }
        }
    </style>

                "CCU": 159,
                "Rating": 90.67,
                "Price": 19.99,
                "Tier": "中型爆款"
        },
        {
                "Name": "Life is Strange 2",
                "CCU": 153,
                "Rating": 86.3,
                "Price": 31.96,
                "Tier": "独立精品"
        },
        {
                "Name": "Counter-Strike: Condition Zero",
                "CCU": 83,
                "Rating": 89.75,
                "Price": 9.99,
                "Tier": "经典神作"
        },
        {
                "Name": "CyberCorp",
                "CCU": 3,
                "Rating": 82.61,
                "Price": 9.74,
                "Tier": "独立精品"
        },
        {
                "Name": "Half-Life 2: Lost Coast",
                "CCU": 2,
                "Rating": 89.25,
                "Price": 19.99,
                "Tier": "中型爆款"
        },
        {
                "Name": "Street Warriors Online",
                "CCU": 1,
                "Rating": 57.59,
                "Price": 1.99,
                "Tier": "独立精品"
        },
        {
                "Name": "Grand Theft Auto IV: Complete Edition",
                "CCU": 0,
                "Rating": 82.48,
                "Price": 0.0,
                "Tier": "经典神作"
        },
        {
                "Name": "Ring of Elysium",
                "CCU": 0,
                "Rating": 74.47,
                "Price": 0.0,
                "Tier": "免费竞技"
        },
        {
                "Name": "Heroes & Generals",
                "CCU": 0,
                "Rating": 67.59,
                "Price": 0.0,
                "Tier": "免费竞技"
        }
];

        const color = d3.scaleOrdinal()
            .domain(["AAA大作", "独立精品", "免费竞技", "中型爆款", "经典神作"])
            .range(["#f87171", "#34d399", "#60a5fa", "#fbbf24", "#c084fc"]);

        const sortedData = [...data].sort((a, b) => d3.descending(a.CCU, b.CCU));
        const tooltip = d3.select("#tooltip");
        const chartWrap = document.getElementById("chart-wrap");

        const rowHeight = 28;
        const margin = { top: 90, right: 130, bottom: 70, left: 270 };
        const width = Math.max(chartWrap.clientWidth, 1080) - margin.left - margin.right;
        const height = sortedData.length * rowHeight;

        const svg = d3.select("#chart-scroll")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom);

        const g = svg.append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleLinear()
            .domain([0, d3.max(sortedData, d => d.CCU)]).nice()
            .range([0, width]);

        const y = d3.scaleBand()
            .domain(sortedData.map(d => d.Name))
            .range([0, height])
            .padding(0.22);

        g.append("g")
            .attr("class", "grid")
            .call(d3.axisTop(x)
                .ticks(8)
                .tickSize(-height)
                .tickFormat(d => d3.format(",")(d)))
            .call(g => g.selectAll("text").remove());

        g.append("g")
            .attr("class", "axis")
            .call(d3.axisLeft(y).tickSize(0))
            .call(g => g.selectAll("text")
                .attr("dx", "-0.4em")
                .style("font-size", "11px"))
            .call(g => g.select(".domain").remove());

        g.append("g")
            .attr("class", "axis")
            .call(d3.axisTop(x)
                .ticks(8)
                .tickFormat(d => d3.format(",")(d)));

        g.selectAll(".bar")
            .data(sortedData)
            .enter()
            .append("rect")
            .attr("class", "bar")
            .attr("x", 0)
            .attr("y", d => y(d.Name))
            .attr("height", y.bandwidth())
            .attr("width", 0)
            .attr("rx", 6)
            .attr("fill", d => color(d.Tier))
            .on("mousemove", function (event, d) {
                tooltip
                    .style("opacity", 1)
                    .style("transform", "translateY(0)")
                    .style("left", `${event.clientX + 16}px`)
                    .style("top", `${event.clientY + 16}px`)
                    .html(`
                        <strong>${d.Name}</strong>
                        <div class="tooltip-row"><span>Tier</span><span>${d.Tier}</span></div>
                        <div class="tooltip-row"><span>CCU</span><span>${d.CCU.toLocaleString()}</span></div>
                        <div class="tooltip-row"><span>Rating</span><span>${d.Rating}%</span></div>
                        <div class="tooltip-row"><span>Price</span><span>${d.Price === 0 ? 'Free' : '$' + d.Price}</span></div>
                    `);
                d3.select(this).attr("opacity", 0.88);
            })
            .on("mouseleave", function () {
                tooltip.style("opacity", 0).style("transform", "translateY(6px)");
                d3.select(this).attr("opacity", 1);
            })
            .transition()
            .duration(900)
            .delay((_, index) => Math.min(index * 18, 1000))
            .attr("width", d => x(d.CCU));

        g.selectAll(".value-label")
            .data(sortedData)
            .enter()
            .append("text")
            .attr("x", d => x(d.CCU) + 8)
            .attr("y", d => y(d.Name) + y.bandwidth() / 2)
            .attr("dy", "0.35em")
            .attr("fill", "#cbd5e1")
            .style("font-size", "10px")
            .text(d => d3.format(",")(d.CCU));

        svg.append("text")
            .attr("class", "chart-title")
            .attr("x", margin.left)
            .attr("y", 38)
            .text("按同时在线人数排序的 Steam 游戏横向柱状图");

        svg.append("text")
            .attr("class", "chart-subtitle")
            .attr("x", margin.left)
            .attr("y", 62)
            .text("柱长表示 CCU，颜色表示 Tier，评分和价格在提示框中显示");

        svg.append("text")
            .attr("class", "axis-label")
            .attr("x", margin.left + width / 2)
            .attr("y", height + margin.top + 48)
            .attr("text-anchor", "middle")
            .text("同时在线人数（CCU）");

        const stats = [
            { label: "游戏数量", value: sortedData.length.toLocaleString() },
            { label: "最高 CCU", value: d3.format(",")(d3.max(sortedData, d => d.CCU)) },
            { label: "平均评分", value: `${d3.mean(sortedData, d => d.Rating).toFixed(2)}%` },
            { label: "免费游戏占比", value: `${(sortedData.filter(d => d.Price === 0).length / sortedData.length * 100).toFixed(1)}%` }
        ];

        d3.select("#stats")
            .selectAll(".stat-item")
            .data(stats)
            .enter()
            .append("div")
            .attr("class", "stat-item")
            .html(d => `<span class="stat-label">${d.label}</span><span class="stat-value">${d.value}</span>`);

        d3.select("#legend")
            .selectAll(".legend-item")
            .data(color.domain())
            .enter()
            .append("div")
            .attr("class", "legend-item")
            .html(d => `<span class="legend-color" style="background:${color(d)}"></span><span>${d}</span>`);
    </script>
</body>
</html>
