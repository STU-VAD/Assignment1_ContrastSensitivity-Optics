<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 可视化 - 终极功能齐备版</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg: #010409;
            --primary: #58a6ff;
            --text-main: #f0f6fc;
            --text-sec: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow-x: auto;
        }

        .header { text-align: center; padding: 25px 0; }
        .header h1 { font-size: 2.2rem; margin: 0; font-weight: 200; color: var(--primary); letter-spacing: 4px; }
        .header p { color: var(--text-sec); font-size: 14px; margin-top: 8px; }

        #chart-wrap {
            width: 1540px;
            height: 780px;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid #30363d;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
            margin-bottom: 50px;
        }

        .bubble { stroke: rgba(255, 255, 255, 0.4); stroke-width: 0.5px; opacity: 0.8; transition: all 0.3s ease; }
        .bubble:hover { stroke: #fff; stroke-width: 2px; opacity: 1; cursor: pointer; }

        .game-title {
            font-size: 11px;
            fill: #fff;
            pointer-events: none;
            text-shadow: -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000, 1px 1px 2px #000;
            font-weight: 600;
        }

        .tick text { fill: #8b949e; font-size: 10px; }
        .tick line { stroke: #30363d; }
        .domain { stroke: #30363d; }
        .axis-label { fill: #8b949e; font-size: 13px; font-weight: 600; text-transform: uppercase; }

        .tooltip {
            position: absolute;
            background: #161b22;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid var(--primary);
            pointer-events: none;
            opacity: 0;
            color: #fff;
            z-index: 2000;
        }

        /* 颜色图例 */
        .color-legend {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(22, 27, 34, 0.9);
            padding: 15px;
            border: 1px solid #30363d;
            border-radius: 8px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; color: #f0f6fc; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }

        /* 大小比例尺 */
        .size-legend {
            position: absolute;
            bottom: 100px;
            right: 30px;
            background: rgba(22, 27, 34, 0.9);
            padding: 15px;
            border: 1px solid #30363d;
            border-radius: 8px;
            text-align: center;
        }
        .size-legend-title { font-size: 11px; color: var(--text-sec); margin-bottom: 15px; font-weight: 600; }
        .size-ref-label { fill: #8b949e; font-size: 10px; font-family: sans-serif; }
    </style>
 head>
<body>

    <div class="header">
        <h1>Steam 游戏质量分布 (全功能补全版)</h1>
        <p>文字置顶 | 1$ 极细精度 | 右侧颜色图例 | 右下角规模比例尺</p>
    </div>

    <div id="chart-wrap">
        <div id="tooltip" class="tooltip"></div>
        
        <!-- 颜色分类图例 -->
        <div class="color-legend" id="color-legend"></div>

        <!-- 气泡规模比例尺 -->
        <div class="size-legend" id="size-legend">
            <div class="size-legend-title">在线人数/气泡规模对照</div>
            <svg id="size-svg" width="120" height="150"></svg>
        </div>
    </div>

    <script>
        const data = [
        {"Name":"Counter-Strike: Global Offensive","CCU":1013936,"Rating":86.69,"Price":0,"Tier":"Other"},
        {"Name":"PUBG: BATTLEGROUNDS","CCU":314682,"Rating":59.44,"Price":0,"Tier":"Other"},
        {"Name":"Rust","CCU":143870,"Rating":87.24,"Price":39.99,"Tier":"Other"},
        {"Name":"Apex Legends","CCU":124262,"Rating":67.14,"Price":0,"Tier":"Other"},
        {"Name":"Wallpaper Engine","CCU":91184,"Rating":98.04,"Price":4.99,"Tier":"Other"},
        {"Name":"Grand Theft Auto V Legacy","CCU":67851,"Rating":87.41,"Price":0,"Tier":"Other"},
        {"Name":"Call of Duty: Modern Warfare II","CCU":67419,"Rating":58.76,"Price":38.49,"Tier":"Other"},
        {"Name":"NARAKA: BLADEPOINT","CCU":66954,"Rating":69.54,"Price":0,"Tier":"Other"},
        {"Name":"Baldur's Gate 3","CCU":54771,"Rating":96.85,"Price":59.99,"Tier":"Other"},
        {"Name":"HELLDIVERS 2","CCU":53399,"Rating":76.24,"Price":39.99,"Tier":"Other"},
        {"Name":"Tom Clancy's Rainbow Six Siege","CCU":51847,"Rating":83.86,"Price":19.99,"Tier":"Other"},
        {"Name":"Stardew Valley","CCU":50662,"Rating":98.44,"Price":14.99,"Tier":"Other"},
        {"Name":"War Thunder","CCU":50478,"Rating":63.99,"Price":0,"Tier":"Other"},
        {"Name":"Dead by Daylight","CCU":44886,"Rating":79.05,"Price":19.99,"Tier":"Other"},
        {"Name":"Team Fortress 2","CCU":43819,"Rating":89.91,"Price":0,"Tier":"Other"},
        {"Name":"DayZ","CCU":37066,"Rating":76.78,"Price":49.99,"Tier":"Other"},
        {"Name":"Warframe","CCU":36195,"Rating":87.05,"Price":0,"Tier":"Other"},
        {"Name":"VRChat","CCU":34699,"Rating":75.56,"Price":0,"Tier":"Other"},
        {"Name":"R.E.P.O.","CCU":32349,"Rating":96.51,"Price":9.99,"Tier":"Other"},
        {"Name":"Don't Starve Together","CCU":30542,"Rating":95.26,"Price":14.99,"Tier":"Other"},
        {"Name":"Red Dead Redemption 2","CCU":29885,"Rating":92.25,"Price":14.99,"Tier":"Other"},
        {"Name":"ELDEN RING","CCU":29529,"Rating":92.89,"Price":59.99,"Tier":"Other"},
        {"Name":"PAYDAY 2","CCU":27254,"Rating":89.63,"Price":9.99,"Tier":"Other"},
        {"Name":"Sid Meier’s Civilization VI","CCU":25420,"Rating":86.89,"Price":59.99,"Tier":"Other"},
        {"Name":"The Sims 4","CCU":25276,"Rating":87.31,"Price":0,"Tier":"Other"},
        {"Name":"Left 4 Dead 2","CCU":25122,"Rating":97.54,"Price":9.99,"Tier":"Other"},
        {"Name":"Destiny 2","CCU":24619,"Rating":79.58,"Price":0,"Tier":"Other"},
        {"Name":"Terraria","CCU":24580,"Rating":97.48,"Price":9.99,"Tier":"Other"},
        {"Name":"Project Zomboid","CCU":22864,"Rating":94.19,"Price":19.99,"Tier":"Other"},
        {"Name":"Schedule I","CCU":22757,"Rating":98.41,"Price":19.99,"Tier":"Other"},
        {"Name":"Cyberpunk 2077","CCU":22265,"Rating":84.39,"Price":59.99,"Tier":"Other"},
        {"Name":"ARK: Survival Evolved","CCU":22170,"Rating":83.84,"Price":14.99,"Tier":"Other"},
        {"Name":"Rocket League","CCU":21106,"Rating":87.35,"Price":0,"Tier":"Other"},
        {"Name":"Garry's Mod","CCU":18400,"Rating":96.8,"Price":9.99,"Tier":"Other"},
        {"Name":"Palworld","CCU":18028,"Rating":94.1,"Price":22.49,"Tier":"Other"},
        {"Name":"Lost Ark","CCU":17355,"Rating":71.02,"Price":0,"Tier":"Other"},
        {"Name":"Euro Truck Simulator 2","CCU":17281,"Rating":97.36,"Price":19.99,"Tier":"Other"},
        {"Name":"7 Days to Die","CCU":17045,"Rating":88.61,"Price":44.99,"Tier":"Other"},
        {"Name":"Path of Exile 2","CCU":16727,"Rating":70.12,"Price":29.99,"Tier":"Other"},
        {"Name":"The Witcher 3: Wild Hunt","CCU":15893,"Rating":96.13,"Price":39.99,"Tier":"Other"},
        {"Name":"Black Myth: Wukong","CCU":15004,"Rating":96.66,"Price":59.99,"Tier":"Other"},
        {"Name":"三国杀","CCU":5000,"Rating":85,"Price":0,"Tier":"Card Game"}
        ];

        const wrap = document.getElementById('chart-wrap');
        const margin = {top: 80, right: 40, bottom: 80, left: 80};
        const width = wrap.clientWidth - margin.left - margin.right;
        const height = wrap.clientHeight - margin.top - margin.bottom;

        const svg = d3.select("#chart-wrap").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleLinear().domain([0, 82]).range([60, width]); 
        const y = d3.scaleLinear().domain([40, 102]).range([height, 0]);
        const z = d3.scaleSqrt().domain([0, 1200000]).range([4, 65]);

        const color = d3.scaleOrdinal()
            .domain(["AAA大作", "独立精品", "免费竞技", "中型爆款", "经典神作"])
            .range(["#f85149", "#3fb950", "#2f81f7", "#d29922", "#bc8cff"]);

        // 绘制坐标轴
        svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x).ticks(82).tickFormat(d => (d % 5 === 0 ? d + "$" : "")));
        svg.append("g").call(d3.axisLeft(y).ticks(8));

        const simulation = d3.forceSimulation(data)
            .force("cx", d3.forceX(d => x(d.Price)).strength(1.8))
            .force("cy", d3.forceY(d => y(d.Rating)).strength(1.8))
            .force("collide", d3.forceCollide(d => z(d.CCU) + 2))
            .stop();

        for (let i = 0; i < 600; ++i) simulation.tick();

        // 绘制层级 1：气泡
        const bubbleGroup = svg.append("g");
        bubbleGroup.selectAll(".bubble")
            .data(data).enter().append("circle").attr("class", "bubble")
            .attr("cx", d => d.x).attr("cy", d => d.y).attr("r", d => z(d.CCU))
            .style("fill", d => color(d.Tier))
            .on("mouseover", (e, d) => {
                d3.select("#tooltip").style("opacity", 1).html(`<b>${d.Name}</b><br/>在线: ${d.CCU.toLocaleString()}`)
                   .style("left", (e.pageX + 15) + "px").style("top", (e.pageY - 15) + "px");
            })
            .on("mouseout", () => d3.select("#tooltip").style("opacity", 0));

        // 绘制层级 2：标注
        const labelGroup = svg.append("g");
        labelGroup.selectAll(".game-title").data(data).enter().append("text").attr("class", "game-title")
            .attr("x", d => d.x).attr("y", d => d.y).attr("dy", d => -z(d.CCU) - 6).attr("text-anchor", "middle")
            .text(d => d.CCU > 24000 ? d.Name : "");

        // 恢复颜色图例
        const colLegend = d3.select("#color-legend");
        ["AAA大作", "独立精品", "免费竞技", "中型爆款", "经典神作"].forEach(t => {
            const item = colLegend.append("div").attr("class", "legend-item");
            item.append("div").attr("class", "legend-color").style("background", color(t));
            item.append("span").text(t);
        });

        // 绘制规模对照比例尺 (右下角)
        const sSvg = d3.select("#size-svg");
        const valuesToShow = [1000000, 500000, 100000];
        const xCircle = 60, yCircle = 130;

        sSvg.selectAll("circle").data(valuesToShow).enter().append("circle")
            .attr("cx", xCircle).attr("cy", d => yCircle - z(d))
            .attr("r", d => z(d))
            .style("fill", "none").attr("stroke", "#8b949e").style("stroke-dasharray", ("2,2"));

        sSvg.selectAll("text").data(valuesToShow).enter().append("text")
            .attr("x", xCircle).attr("y", d => yCircle - 2 * z(d) - 5)
            .text(d => (d/10000) + "w 人").attr("class", "size-ref-label").attr("text-anchor", "middle");

    </script>
</body>
</html>
